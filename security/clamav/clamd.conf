# clamd.conf — ClamAV Daemon Configuration
# Member B — Upload Pipeline & Security
#
# This file configures the ClamAV daemon (clamd) used for async virus scanning
# of uploaded files before they are approved for storage.
#
# Scan pipeline:
#   Upload → quarantine (tmpfs) → clamd scan → approve/delete
#
# Do NOT expose clamd socket/port to the internet.
# Only the backend scan service (upload/services/scan.service.js) connects to it.
# ─────────────────────────────────────────────────────────────────────────────

# ── Identity ──────────────────────────────────────────────────────────────────
# Run as a dedicated low-privilege user
User   clamav
# Daemon mode (required for clamd)

# ── Logging ───────────────────────────────────────────────────────────────────
LogFile         /var/log/clamav/clamd.log
LogFileMaxSize  10M
LogTime         yes
LogVerbose      no
LogSyslog       yes
LogFacility     LOG_DAEMON
# Log all detected threats
LogClean        no

# ── PID ───────────────────────────────────────────────────────────────────────
PidFile /run/clamav/clamd.pid

# ── Database ──────────────────────────────────────────────────────────────────
# Virus signature database directory (updated by freshclam)
DatabaseDirectory /var/lib/clamav

# ── Socket (Unix — preferred over TCP for security, no network exposure) ──────
# Backend scan.service.js connects via this socket.
# Permissions restrict access to the clamav group only.
LocalSocket     /run/clamav/clamd.ctl
LocalSocketMode 660
# Do NOT enable TCPSocket unless required — keep clamd off the network
# TCPSocket 3310
# TCPAddr  127.0.0.1

# ── Scan Limits ───────────────────────────────────────────────────────────────
# Maximum file size to scan (must match backend 5 MB upload limit)
MaxFileSize         6M    # slightly above upload limit to catch edge cases
MaxScanSize         6M
MaxRecursion        5     # archive recursion depth
MaxFiles            20    # max files in archive
MaxEmbeddedPE       10M   # max size of embedded PE sections
MaxHTMLNormalize    10M
MaxHTMLNoTags       2M
MaxScriptNormalize  5M
MaxZipTypeRcg       1M

# File size limit — reject files over this without scanning
StreamMaxLength 6M

# ── Scan Options ──────────────────────────────────────────────────────────────
# Scan archive contents (zip, tar, gz, etc.)
ScanArchive         yes
# Scan OLE2 documents (Word, Excel)
ScanOLE2            yes
# Scan PDF files
ScanPDF             yes
# Scan SWF (Flash)
ScanSWF             yes
# Scan HTML
ScanHTML            yes
# Scan ELF binaries
ScanELF             yes
# Scan PE (Windows executables)
ScanPE              yes
# Algorithmic detection (heuristics)
AlgorithmicDetection yes
# Detect broken executables — may be obfuscated malware
DetectBrokenExecutables yes
# Block encrypted archives (cannot scan inside — treat as suspicious)
BlockEncryptedArchives  yes
# Block OLE2 macros
OLE2BlockMacros         yes
# Phishing heuristics
PhishingSignatures      yes
PhishingScanURLs        yes
# Structured data detection
StructuredDataDetection yes

# ── YARA Rules ────────────────────────────────────────────────────────────────
# Load custom YARA rules from the project security directory.
# These cover malware, ransomware, and webshell signatures.
# Paths are relative to the Docker working directory.
# Hot-reload is handled by clamd watching this directory.
DatabaseCustomURL file:///etc/clamav/yara-rules/malware.yar
DatabaseCustomURL file:///etc/clamav/yara-rules/ransomware.yar
DatabaseCustomURL file:///etc/clamav/yara-rules/webshell.yar

# ── Performance ───────────────────────────────────────────────────────────────
# Number of scanning threads (match to available CPU cores)
MaxThreads          4
# Idle thread timeout
IdleTimeout         30
# Maximum queue size for incoming scan requests
MaxQueue            100

# ── Timeouts ──────────────────────────────────────────────────────────────────
# Read timeout for incoming data (seconds)
ReadTimeout         60
# Send timeout for outgoing results
SendBufTimeout      500
# Command timeout
CommandReadTimeout  30

# ── Quarantine ────────────────────────────────────────────────────────────────
# Infected files are NOT moved by clamd itself — the backend scan.service.js
# handles quarantine logic after receiving the scan result.
# Do NOT set MoveInfected or RemoveInfected here; let the app control it.

# ── Self-protection ───────────────────────────────────────────────────────────
# Do not scan files clamd itself writes (avoid loops)
SelfCheck 3600

# ── Bytecode ─────────────────────────────────────────────────────────────────
# Enable bytecode interpreter for advanced threat detection
Bytecode            yes
BytecodeSecurity    TrustSigned
BytecodeTimeout     60000

# ── Foreground (for Docker) ───────────────────────────────────────────────────
# Run in foreground so Docker can manage the process lifecycle
Foreground yes