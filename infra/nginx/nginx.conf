events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Security headers
  add_header X-Frame-Options "DENY" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  # SSL
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers on;
  ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

  # Rate limiting zone
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;

  upstream backend {
    server backend:5000;
  }

  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    server_name _;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # API routes
    location /api/ {
      limit_req zone=api burst=20 nodelay;
      proxy_pass http://backend/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend
    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
    }
  }
}

# infra/nginx/nginx.conf — Member C Security
#
# Responsibilities:
#   - TLS 1.3 only (no TLS 1.0/1.1/1.2)
#   - HSTS with 1-year max-age + preload
#   - CSP Level 3 with strict-dynamic + per-request nonce
#   - Security headers: X-Frame-Options, X-Content-Type-Options, etc.
#   - Referrer-Policy, Permissions-Policy
#
# Does NOT touch backend routes — proxies /api, /auth, /upload to backend.
# Backend team (Member A/B) owns those services.
# ─────────────────────────────────────────────────────────────────────────────

# ── Events & Worker ──────────────────────────────────────────────────────────
worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    # ── Basic Settings ───────────────────────────────────────────────────────
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    server_tokens   off;   # hide nginx version

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    '$request_time';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ── Rate Limiting Zones (frontend layer; backend Redis limiter is authoritative) ──
    limit_req_zone $binary_remote_addr zone=frontend:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=api:10m      rate=10r/s;

    # ── Nonce Generation ─────────────────────────────────────────────────────
    # A unique nonce is generated per request using the request ID.
    # $request_id is a 32-hex-char string provided by nginx automatically.
    # We base64-encode it to conform to the CSP nonce format requirement
    # (must be base64, no special chars).
    #
    # The nonce is substituted into:
    #   1. The CSP header (script-src, style-src)
    #   2. The HTML response body (replaces the literal string __NONCE__)
    #
    # sub_filter requires the ngx_http_sub_module (included in standard builds).

    # ── SSL/TLS Configuration ────────────────────────────────────────────────
    ssl_protocols             TLSv1.3;          # TLS 1.3 ONLY
    ssl_prefer_server_ciphers off;              # Let client pick from TLS 1.3 defaults
    ssl_session_timeout       1d;
    ssl_session_cache         shared:SSL:50m;
    ssl_session_tickets       off;              # Disable for perfect forward secrecy

    # TLS 1.3 cipher suites (these are the only ones available in TLS 1.3)
    ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;

    # OCSP Stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Redirect HTTP → HTTPS ────────────────────────────────────────────────
    server {
        listen      80;
        listen      [::]:80;
        server_name _;

        # Redirect all HTTP to HTTPS permanently
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server ────────────────────────────────────────────────────
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name yourdomain.com;   # replace with actual domain

        # TLS certificates (managed externally, e.g., Let's Encrypt / internal CA)
        ssl_certificate     /etc/ssl/certs/server.crt;
        ssl_certificate_key /etc/ssl/private/server.key;
        ssl_trusted_certificate /etc/ssl/certs/chain.pem;

        root  /usr/share/nginx/html;
        index index.html;

        # ── Rate Limits ──────────────────────────────────────────────────────
        limit_req zone=frontend burst=50 nodelay;

        # ── Nonce substitution in HTML ────────────────────────────────────────
        # Replace the literal __NONCE__ placeholder in index.html with the
        # per-request nonce value derived from $request_id.
        # This requires the sub_filter module.
        sub_filter '__NONCE__' '$request_id';
        sub_filter_once off;    # replace ALL occurrences (meta tag + script tag)
        sub_filter_types text/html;

        # ── Security Headers ─────────────────────────────────────────────────

        # HSTS — 1 year, include subdomains, preload
        # WARNING: Only enable preload after verifying your entire domain uses HTTPS.
        add_header Strict-Transport-Security
            "max-age=31536000; includeSubDomains; preload" always;

        # CSP Level 3 — strict-dynamic with per-request nonce
        # 'strict-dynamic' propagates trust from nonced scripts to their dynamic imports.
        # 'unsafe-inline' is IGNORED by browsers that support nonces (listed for fallback).
        # object-src / frame-src / base-uri locked down.
        add_header Content-Security-Policy
            "default-src 'self'; \
             script-src 'self' 'nonce-$request_id' 'strict-dynamic'; \
             style-src 'self' 'nonce-$request_id'; \
             img-src 'self' data: blob:; \
             font-src 'self'; \
             connect-src 'self'; \
             media-src 'none'; \
             object-src 'none'; \
             frame-src 'none'; \
             frame-ancestors 'none'; \
             base-uri 'self'; \
             form-action 'self'; \
             upgrade-insecure-requests; \
             block-all-mixed-content; \
             report-uri /api/csp-report;" always;

        # Trusted Types enforcement
        # Requires browser support (Chrome/Edge 83+). Gracefully ignored by Firefox/Safari.
        add_header Content-Security-Policy
            "require-trusted-types-for 'script'; \
             trusted-types default dompurify;" always;

        # Prevent clickjacking
        add_header X-Frame-Options "DENY" always;

        # Prevent MIME-type sniffing
        add_header X-Content-Type-Options "nosniff" always;

        # Referrer — send origin only on same-origin; omit on downgrade
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # Permissions Policy — disable unnecessary browser features
        add_header Permissions-Policy
            "accelerometer=(), \
             ambient-light-sensor=(), \
             autoplay=(), \
             battery=(), \
             camera=(), \
             cross-origin-isolated=(), \
             display-capture=(), \
             document-domain=(), \
             encrypted-media=(), \
             execution-while-not-rendered=(), \
             execution-while-out-of-viewport=(), \
             fullscreen=(self), \
             geolocation=(), \
             gyroscope=(), \
             keyboard-map=(), \
             magnetometer=(), \
             microphone=(), \
             midi=(), \
             navigation-override=(), \
             payment=(), \
             picture-in-picture=(), \
             publickey-credentials-get=(self), \
             screen-wake-lock=(), \
             sync-xhr=(), \
             usb=(), \
             web-share=(), \
             xr-spatial-tracking=()" always;

        # Cross-Origin policies
        add_header Cross-Origin-Opener-Policy  "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;

        # Cache-Control for HTML (no caching — ensures fresh nonce each request)
        add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;

        # ── SPA Routing ───────────────────────────────────────────────────────
        # All frontend routes return index.html; React Router handles navigation.
        location / {
            try_files $uri $uri/ /index.html;

            # Ensure HTML is never cached (fresh nonce per load)
            add_header Cache-Control "no-store, no-cache, must-revalidate, private" always;
            expires -1;
        }

        # ── Static Assets (JS, CSS, fonts, images) ────────────────────────────
        # Vite outputs hashed filenames — safe to cache aggressively.
        location /assets/ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;

            # SRI is enforced by the browser via the integrity attribute in index.html.
            # No additional nginx config needed for SRI.
        }

        # ── Favicon ───────────────────────────────────────────────────────────
        location = /favicon.ico {
            expires 7d;
            add_header Cache-Control "public" always;
            log_not_found off;
            access_log off;
        }

        # ── API Proxy → Backend (Member A/B) ─────────────────────────────────
        # nginx forwards; does NOT inspect or modify API payloads.
        # Backend owns all /api/*, /auth/*, /upload/* routes.

        location /api/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass         http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade $http_upgrade;
            proxy_set_header   Connection 'upgrade';
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_send_timeout    30s;
            proxy_read_timeout    30s;
        }

        location /auth/ {
            limit_req zone=api burst=10 nodelay;
            proxy_pass         http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /upload/ {
            limit_req zone=api burst=5 nodelay;

            # Strict upload size limit (enforced at nginx AND backend)
            client_max_body_size 5m;

            proxy_pass         http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header   Host $host;
            proxy_set_header   X-Real-IP $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Longer timeout for upload + scan pipeline
            proxy_read_timeout 120s;
        }

        # SSE (Audit Log Stream) — disable buffering
        location /api/audit/stream {
            proxy_pass             http://backend:3000;
            proxy_http_version     1.1;
            proxy_set_header       Connection '';
            proxy_set_header       Host $host;
            proxy_set_header       X-Real-IP $remote_addr;
            proxy_set_header       X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header       X-Forwarded-Proto $scheme;
            proxy_buffering        off;      # required for SSE
            proxy_cache            off;
            proxy_read_timeout     3600s;   # keep SSE connection alive
            chunked_transfer_encoding on;
        }

        # ── Block access to hidden files ──────────────────────────────────────
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
    }
}