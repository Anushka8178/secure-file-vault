version: '3.9'

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../infra/docker/Dockerfile.backend
    container_name: vault-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/secure-vault
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      BCRYPT_ROUNDS: 12
      MFA_ISSUER: SecureVault
      MFA_BACKUP_ENCRYPTION_KEY: ${MFA_BACKUP_ENCRYPTION_KEY}
      RESET_TOKEN_SECRET: ${RESET_TOKEN_SECRET}
      CSRF_SECRET: ${CSRF_SECRET}
      SIGNED_LINK_SECRET: ${SIGNED_LINK_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
    depends_on:
      - mongo
      - redis
    networks:
      - vault-net

  frontend:
    build:
      context: ../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend
    container_name: vault-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - vault-net

  worker:
    build:
      context: ../backend
      dockerfile: ../infra/docker/Dockerfile.worker
    container_name: vault-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://mongo:27017/secure-vault
      REDIS_URL: redis://redis:6379
    depends_on:
      - mongo
      - redis
    networks:
      - vault-net

  mongo:
    image: mongo:7
    container_name: vault-mongo
    restart: unless-stopped
    volumes:
      - mongo-data:/data/db
    networks:
      - vault-net

  redis:
    image: redis:7-alpine
    container_name: vault-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-vaultredis}
    volumes:
      - redis-data:/data
    networks:
      - vault-net

  nginx:
    image: nginx:alpine
    container_name: vault-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - vault-net

volumes:
  mongo-data:
  redis-data:

networks:
  vault-net:
    driver: bridge
